<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3662f4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3662f4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)" rx="24"/>
  <!-- Glow -->
  <ellipse cx="200" cy="180" rx="140" ry="130" fill="url(#glow)"/>
  <!-- Hat -->
  <ellipse cx="200" cy="108" rx="70" ry="12" fill="#1c1c3a" opacity="0.8"/>
  <rect x="152" y="52" width="96" height="60" rx="8" fill="#111130"/>
  <rect x="138" y="104" width="124" height="10" rx="5" fill="#1c1c3a"/>
  <!-- Hat band -->
  <rect x="152" y="88" width="96" height="14" fill="#3662f4" opacity="0.85"/>
  <!-- Face -->
  <ellipse cx="200" cy="190" rx="68" ry="76" fill="#f5c8a0"/>
  <!-- Eyes -->
  <ellipse cx="176" cy="174" rx="10" ry="12" fill="#111"/>
  <ellipse cx="224" cy="174" rx="10" ry="12" fill="#111"/>
  <ellipse cx="178" cy="172" rx="4" ry="5" fill="#fff" opacity="0.4"/>
  <ellipse cx="226" cy="172" rx="4" ry="5" fill="#fff" opacity="0.4"/>
  <!-- Joker swirl eyes -->
  <circle cx="176" cy="174" r="6" fill="none" stroke="#3662f4" stroke-width="2" opacity="0.7"/>
  <circle cx="224" cy="174" r="6" fill="none" stroke="#f12b30" stroke-width="2" opacity="0.7"/>
  <!-- Nose -->
  <ellipse cx="200" cy="196" rx="7" ry="5" fill="#e8a07a"/>
  <!-- Smile -->
  <path d="M 172 214 Q 200 238 228 214" stroke="#c0504a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Cheek diamonds -->
  <polygon points="155,205 163,196 171,205 163,214" fill="#f12b30" opacity="0.8"/>
  <polygon points="229,205 237,196 245,205 237,214" fill="#3662f4" opacity="0.8"/>
  <!-- Collar ruffles -->
  <path d="M 140 258 Q 160 242 180 255 Q 200 268 220 255 Q 240 242 260 258" stroke="#e8e8e8" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M 140 258 Q 160 242 180 255 Q 200 268 220 255 Q 240 242 260 258" stroke="#fff" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Body -->
  <path d="M 148 268 Q 132 320 130 370 L 270 370 Q 268 320 252 268 Q 235 250 200 248 Q 165 250 148 268 Z" fill="#2a1a6a"/>
  <!-- Diamond pattern on body -->
  <polygon points="200,280 214,295 200,310 186,295" fill="#3662f4" opacity="0.5"/>
  <polygon points="200,310 214,325 200,340 186,325" fill="#f12b30" opacity="0.5"/>
  <!-- TZ inscription top-left -->
  <text x="18" y="42" font-family="monospace" font-size="22" font-weight="bold" fill="#3662f4">T</text>
  <text x="18" y="68" font-family="monospace" font-size="22" font-weight="bold" fill="#3662f4">Z</text>
  <!-- TZ inscription bottom-right (mirrored) -->
  <g transform="rotate(180, 200, 200)">
    <text x="18" y="42" font-family="monospace" font-size="22" font-weight="bold" fill="#f12b30">T</text>
    <text x="18" y="68" font-family="monospace" font-size="22" font-weight="bold" fill="#f12b30">Z</text>
  </g>
  <!-- Stars -->
  <text x="52" y="160" font-size="16" fill="#3662f4" opacity="0.6">✦</text>
  <text x="330" y="240" font-size="14" fill="#f12b30" opacity="0.6">✦</text>
  <text x="340" y="140" font-size="10" fill="#3662f4" opacity="0.4">★</text>
  <text x="44" y="290" font-size="10" fill="#f12b30" opacity="0.4">★</text>
</svg>
